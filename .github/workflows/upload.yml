name: AI Facebook Reel Upload

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force upload bypassing time slot lock'
        required: false
        type: boolean
        default: false

jobs:
  upload_reel:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (FFmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg || echo "Skipping FFmpeg installation due to sudo restrictions"

      - name: Setup Virtual Environment and Install Dependencies
        run: |
          python3 -m venv venv
          venv/bin/pip install -r requirements.txt
        
      - name: Install Playwright Browsers
        run: venv/bin/playwright install chromium --with-deps
        
      - name: Setup Google Drive Service Account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > service-account.json
          
      - name: Run Upload Scheduler
        env:
          FB_STATE_JSON: ${{ secrets.FB_STATE_JSON }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE_URL: ${{ secrets.OPENAI_API_BASE_URL }}
          OPENAI_API_MODEL: ${{ secrets.OPENAI_API_MODEL }}
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
          FORCE_UPLOAD: ${{ github.event.inputs.force }}
        run: venv/bin/python src/scheduler.py
